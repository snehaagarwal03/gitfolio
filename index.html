<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GitFolio - AI-Powered GitHub Portfolio and Resume Generator. Turn your GitHub profile into a stunning portfolio website and professional resume." />
    <meta name="keywords" content="github, portfolio, resume, developer, AI, generator" />
    <meta name="author" content="GitFolio" />

    <!-- Open Graph -->
    <meta property="og:title" content="GitFolio - AI-Powered GitHub Portfolio Generator" />
    <meta property="og:description" content="Turn your GitHub profile into a stunning portfolio website and professional resume in seconds." />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GitFolio - AI-Powered GitHub Portfolio Generator" />
    <meta name="twitter:description" content="Turn your GitHub profile into a stunning portfolio website and professional resume in seconds." />

    <title>GitFolio | AI-Powered GitHub Portfolio & Resume Generator</title>
  </head>
  <body style="background-color: #0a0a0f; margin: 0;">
    <div id="root">
      <!-- Pre-React loading indicator - gets replaced when React mounts -->
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0f;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
          <div style="width:40px;height:40px;border:4px solid #252530;border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
          <p style="color:#64748b;font-size:14px;font-family:sans-serif;">GitFolio</p>
        </div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
